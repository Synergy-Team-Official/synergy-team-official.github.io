    :root {
      --bg-base: #030307;
      --bg-surface: rgba(8, 8, 16, 0.7);
      --bg-card: rgba(255, 255, 255, 0.025);
      --accent: #8a8da8;
      --accent-hover: #b4b7d0;
      --accent-glow: rgba(138, 141, 168, 0.25);
      --text-main: #e2e2ee;
      --text-muted: #7a7a96;
      --text-dim: #4e4e66;
      --border-subtle: rgba(180, 180, 220, 0.06);
      --border-hover: rgba(180, 180, 220, 0.14);
      --font-main: 'Inter', sans-serif;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;

    .bg-effects {
      position: fixed;
      inset: 0;
      z-index: -20;
      pointer-events: none;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .bg-grid-fine {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 8px 8px;
    }

    .bg-bloom {
      position: fixed;
      inset: 0;
      z-index: -10;
      pointer-events: none;
      overflow: hidden;
    }

    .bloom-1 {
      position: absolute;
      top: -40px;
      left: -128px;
      width: 320px;
      height: 320px;

      filter: blur(80px);

      filter: blur(140px);
